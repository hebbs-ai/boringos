services:
  postgres:
    image: postgres:16
    container_name: boringos-pg-dev
    environment:
      POSTGRES_USER: boringos
      POSTGRES_PASSWORD: boringos
      POSTGRES_DB: boringos
      PGPORT: 5439
    ports:
      - "127.0.0.1:5439:5439"
    volumes:
      - boringos-pgdata-dev:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U boringos -d boringos -p 5439" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  boringos-pgdata-dev:
